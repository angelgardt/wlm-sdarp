bibliography: references.bib

# brand: ../shared/style/_brand.yml

crossref:
  custom:
    - key: mth
      kind: float
      reference-prefix: "Myth"
      caption-prefix: "Myth"
    - key: hst
      kind: float
      reference-prefix: "History"
      caption-prefix: "History"
    - key: prs
      kind: float
      reference-prefix: "Person"
      caption-prefix: "Person"
    - key: dts
      kind: float
      reference-prefix: "Dataset"
      caption-prefix: "Dataset"

format:
