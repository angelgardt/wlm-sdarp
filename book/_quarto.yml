project:
  type: book
  preview:
    port: 5050

# metadata-files:
#   - _metadata.yml

book:
  title: "WLM SDARP"
  date: today

  favicon: img/favicon.png

bibliography: references.bib

format:
  html:
    include-in-header:
      - ../shared/includes/lvl-labels.html
    # title-block-banner: img/title-block-banner.jpg
    title-block-banner-color: "#fafafa"
    toc: true
    toc-depth: 4
    theme:
      - ../shared/css/common.scss

crossref:
  custom:
    - key: mth
      kind: float
      reference-prefix: "Миф"
      caption-prefix: "Миф"

    - key: hst
      kind: float
      reference-prefix: "История"
      caption-prefix: "История"

    - key: prs
      kind: float
      reference-prefix: "Персона"
      caption-prefix: "Персона"

    - key: dts
      kind: float
      reference-prefix: "Датасет"
      caption-prefix: "Датасет"

filters:
  - custom-callouts

editor: source
