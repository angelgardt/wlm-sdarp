    include-in-header:
      - ../shared/includes/lvl-labels.html
    title-block-banner: img/title-block-banner.jpg
    title-block-banner-color: "#fafafa"
    toc: true
    toc-depth: 4
    # theme: ../shared/style/test.scss
    theme:
      light: [../shared/style/theme_general.scss, ../shared/style/theme_light.scss]
      dark: [../shared/style/theme_general.scss, ../shared/style/theme_dark.scss]

editor: source
