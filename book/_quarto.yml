project:
  type: book
  preview:
    port: 5050

# metadata-files:
#   - _metadata.yml


book:
  title: "WLM SDARP"
  date: today
  favicon: img/favicon.png
  navbar:
    left:
      - text: "Book"
        href: ""
      - text: "Tests"
        href: ""

bibliography: references.bib
csl: ../shared/refs/apa.csl

crossref:
  chapters: true
  custom:
    - key: mth
      kind: float
      reference-prefix: "Myth"
      caption-prefix: "Myth"
    - key: hst
      kind: float
      reference-prefix: "History"
      caption-prefix: "History"
    - key: prs
      kind: float
      reference-prefix: "Person"
      caption-prefix: "Person"
    - key: dts
      kind: float
      reference-prefix: "Dataset"
      caption-prefix: "Dataset"
    - key: cse
      kind: float
      reference-prefix: "Case"
      caption-prefix: "Case"
    - key: sch
      kind: float
      reference-prefix: "Scheme"
      caption-prefix: "Scheme"
    - key: vid
      kind: float
      reference-prefix: "Video"
      caption-prefix: "Video"


format:
  html:
    include-in-header:
      - ../shared/includes/lvl-labels.html
    # include-after-body:
    #   - text: |
    #       <script type="text/javascript" src="../../../assets/js/level-filter.js"></script>
    title-block-banner: img/title-block-banner.jpg
    title-block-banner-color: "#f8f9fa"
    lightbox: true
    toc: true
    toc-depth: 4
    theme:
      light:
        - ../shared/style/light.scss
        - ../shared/style/common.scss
      dark:
        - ../shared/style/dark.scss
        - ../shared/style/common.scss

editor: source
